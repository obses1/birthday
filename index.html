<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", Georgia, serif;
    background: #1a0020;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ============ Page Container ============ */
  .page {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s ease;
    z-index: 10;
  }
  .page.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  canvas.bg-canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
  }

  /* ============ Page 1: Login ============ */
  #page1 {
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #f06292 100%);
  }

  .login-card {
    text-align: center;
    z-index: 10;
  }

  .login-card .icon {
    position: relative;
  }

  /* 3D Cake */
  #cake3d {
    display: block;
    margin: 0 auto 8px;
    width: 220px;
    height: 200px;
  }

  .login-card h2 {
    font-size: 1.5rem;
    color: #fff;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }

  .pwd-input-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 6px 6px 6px 24px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 24px rgba(240,100,150,0.2);
  }

  .pwd-input-wrap input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 1.2rem;
    color: #fff;
    width: 160px;
    letter-spacing: 0.3em;
    font-family: inherit;
  }
  .pwd-input-wrap input::placeholder {
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
  }

  .pwd-input-wrap button {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.35);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pwd-input-wrap button:hover {
    background: rgba(255,255,255,0.5);
  }

  .login-error {
    margin-top: 14px;
    color: #ff6b8a;
    font-size: 0.9rem;
    height: 22px;
    text-shadow: 0 0 8px rgba(255,100,130,0.4);
  }

  /* ============ Page 2: Fireworks + Particle Text ============ */
  #page2 { background: radial-gradient(ellipse at center, #2d1040 0%, #0d0018 100%); }

  #particleTextCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .greeting-text {
    z-index: 10;
    text-align: center;
    animation: fadeInUp 1s ease;
  }

  .greeting-text h1 {
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-shadow:
      0 0 20px rgba(255,180,220,0.8),
      0 0 40px rgba(255,150,200,0.5),
      0 0 80px rgba(255,120,180,0.3);
    animation: titleGlow 2s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { text-shadow: 0 0 20px rgba(255,180,220,0.6), 0 0 40px rgba(255,150,200,0.3); }
    100% { text-shadow: 0 0 30px rgba(255,200,240,0.9), 0 0 60px rgba(255,150,200,0.6), 0 0 100px rgba(255,120,200,0.4); }
  }

  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ============ Page 3: Meteor Shower ============ */
  #page3 { background: linear-gradient(180deg, #0a0a1a 0%, #1a1030 50%, #0d1028 100%); }
  #meteorBg { position: fixed; top: 0; left: 0; z-index: 0; }

  .meteor-text {
    z-index: 10;
    text-align: center;
    margin: 0 16px;
  }

  .meteor-line {
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
    line-height: 2.2;
    letter-spacing: 0.06em;
    text-shadow:
      0 0 10px rgba(200,200,255,0.6),
      0 0 2px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 1s ease;
  }
  .meteor-line.show { opacity: 1; }

  /* ============ Page 4: Cake + Blessing ============ */
  #page4 {
    background: radial-gradient(ellipse at center, #2a1838 0%, #120720 100%);
  }

  .final-content {
    z-index: 10;
    text-align: center;
    animation: fadeInUp 1s ease;
  }

  .blessing-text {
    margin: 20px 0;
    font-size: 1.1rem;
    line-height: 2.2;
    color: rgba(255,255,255,0.82);
    text-shadow: 0 0 8px rgba(255,200,230,0.3);
    letter-spacing: 0.06em;
  }

  /* ---- Next Button ---- */
  .next-btn {
    z-index: 10;
    margin-top: 40px;
    padding: 12px 40px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-size: 1.05rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    box-shadow: 0 0 20px rgba(200,150,255,0.15);
  }
  #toPage3 { margin-top: 240px; }

  .next-btn:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 32px rgba(200,150,255,0.3);
    transform: translateY(-2px);
  }

  /* ---- 3D Particle Cake (Page 4) ---- */
  #particleCake4 {
    display: block;
    margin: 16px auto 0;
    width: 360px;
    height: 360px;
  }

  .wish-hint {
    z-index: 10;
    margin-top: 24px;
    color: rgba(255,255,255,0.55);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    animation: fadeInUp 1.5s ease 1s both;
  }

  .wish-success {
    z-index: 20;
    position: fixed;
    top: 32%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 2.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.15em;
    white-space: nowrap;
    text-shadow:
      0 0 30px rgba(255,200,80,0.9),
      0 0 60px rgba(255,140,40,0.6),
      0 0 100px rgba(255,80,20,0.4);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
    pointer-events: none;
  }
  .wish-success.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* ---- Card Open Button ---- */
  .card-open-btn {
    position: fixed;
    top: 50%; left: 50%;
    z-index: 15;
    padding: 14px 48px;
    border-radius: 40px;
    border: 1px solid rgba(255,215,0,0.5);
    background: linear-gradient(180deg,
      rgba(255,215,0,0.18) 0%,
      rgba(255,180,0,0.06) 100%);
    color: #ffd700;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    font-family: inherit;
    opacity: 0;
    transform: translate(-50%, -50%) translateY(20px) perspective(600px) rotateX(2deg);
    transition: opacity 0.6s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
    pointer-events: none;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.3),
      0 8px 20px rgba(0,0,0,0.2),
      0 0 20px rgba(255,200,80,0.2),
      inset 0 1px 0 rgba(255,255,255,0.08);
    text-shadow: 0 0 12px rgba(255,200,80,0.5);
    white-space: nowrap;
  }
  .card-open-btn.show {
    opacity: 1;
    transform: translate(-50%, -50%) perspective(600px) rotateX(0deg);
    pointer-events: auto;
    animation: btnFloat 3s ease-in-out infinite;
  }
  .card-open-btn.show:hover {
    transform: translate(-50%, calc(-50% - 6px)) perspective(600px) rotateX(0deg) scale(1.04);
    box-shadow:
      0 12px 18px rgba(0,0,0,0.35),
      0 16px 36px rgba(0,0,0,0.25),
      0 0 40px rgba(255,200,80,0.45),
      0 0 72px rgba(255,180,60,0.25),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }

  @keyframes btnFloat {
    0%, 100% { transform: translate(-50%, -50%) perspective(600px) rotateX(0deg); }
    50% { transform: translate(-50%, calc(-50% - 5px)) perspective(600px) rotateX(0deg); }
  }

  /* ---- Card Overlay ---- */
  .card-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .card-overlay.show {
    opacity: 1;
    visibility: visible;
  }

  .card-box {
    background: linear-gradient(135deg, #2a1838 0%, #1a1030 100%);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 16px;
    width: min(85vw, 400px);
    min-height: 300px;
    padding: 32px 28px;
    position: relative;
    box-shadow: 0 0 60px rgba(255,180,100,0.2);
  }

  .card-content {
    color: rgba(255,255,255,0.85);
    font-size: 1rem;
    line-height: 2;
    letter-spacing: 0.06em;
  }

  .card-close-btn {
    position: absolute;
    top: 12px; right: 16px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 1.3rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .card-close-btn:hover { color: #fff; }

  /* ---- Floating Light Dots (Page 4) ---- */
  .float-dot {
    position: absolute;
    z-index: 5;
    border-radius: 50%;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
  }

  <!-- ---- Meteor text area ---- -->
  .meteor-placeholder {
    margin-top: 12px;
    padding: 16px 24px;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 12px;
    color: rgba(255,255,255,0.45);
    font-size: 0.95rem;
  }

  /* ---- Video Background ---- */
  .bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
  }
</style>

<body>

<!-- ==================== Page 1: Login ==================== -->
<div class="page" id="page1">
  <div class="login-card">

<script type="module">
// ==================== Page Navigation ====================
const page1 = document.getElementById('page1');
const page2 = document.getElementById('page2');
const page3 = document.getElementById('page3');
const page4 = document.getElementById('page4');

let activeCanvas = null;

function showPage(page) {
  [page1, page2, page3, page4].forEach(p => p.classList.add('hidden'));
  page.classList.remove('hidden');
}

// ==================== Page 1: Login Logic ====================
const pwdInput = document.getElementById('pwdInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
let loggedIn = false;

function doLogin() {
  if (loggedIn) return;
  if (pwdInput.value === '0601') {
    loggedIn = true;
    loginError.textContent = '';
    showPage(page2);
    startFireworks();
    startParticleText();
  } else {
    loginError.textContent = '密码错误，再试一次吧 ✨';
    pwdInput.value = '';
    pwdInput.focus();
  }
}

loginBtn.addEventListener('click', doLogin);
pwdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

// ==================== Page 2: Fireworks ====================
const fwCanvas = document.getElementById('fireworkCanvas');
const fwCtx = fwCanvas.getContext('2d');
let fwActive = false;
let fwParticles = [];
let fwTimer = 0;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

function resizeFW() {
  fwCanvas.width = window.innerWidth * dpr;
  fwCanvas.height = window.innerHeight * dpr;
  fwCanvas.style.width = window.innerWidth + 'px';
  fwCanvas.style.height = window.innerHeight + 'px';
  fwCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeFW();

class FireworkParticle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = Math.random() * 0.012 + 0.006;
    this.color = color;
    this.size = Math.random() * 2 + 1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.03;
    this.vx *= 0.99;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.35, this.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnFW(x, y) {
  const colors = [
    'rgb(255,120,180)', 'rgb(255,180,100)', 'rgb(255,220,80)',
    'rgb(180,130,255)', 'rgb(100,200,255)', 'rgb(255,140,200)',
    'rgb(255,200,120)', 'rgb(140,255,200)',
  ];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const count = 50 + Math.floor(Math.random() * 60);
  for (let i = 0; i < count; i++) {
    fwParticles.push(new FireworkParticle(x, y, c));
  }
}

function autoFirework() {
  if (!fwActive) return;
  fwTimer--;
  if (fwTimer <= 0) {
    const x = Math.random() * window.innerWidth * 0.8 + window.innerWidth * 0.1;
    const y = Math.random() * window.innerHeight * 0.5 + window.innerHeight * 0.1;
    spawnFW(x, y);
    fwTimer = 20 + Math.floor(Math.random() * 40);
  }
}

function animateFW() {
  if (!fwActive) return;
  fwCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fwCtx.fillStyle = 'rgba(13, 0, 24, 0.2)';
  fwCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  autoFirework();

  for (let i = fwParticles.length - 1; i >= 0; i--) {
    fwParticles[i].update();
    fwParticles[i].draw(fwCtx);
    if (fwParticles[i].life <= 0) fwParticles.splice(i, 1);
  }
  requestAnimationFrame(animateFW);
}

function startFireworks() {
  if (fwActive) return;
  fwActive = true;
  resizeFW();
  fwParticles = [];
  fwTimer = 0;
  animateFW();
}

function stopFireworks() {
  fwActive = false;
  fwParticles = [];
}

// ==================== Particle Text Animation ====================
const ptCanvas = document.getElementById('particleTextCanvas');
const ptCtx = ptCanvas.getContext('2d');
let ptActive = false;
let ptParticles = [];
const ptTexts = ['同桌', '生日快乐'];
const ptTimers = [];

function resizePT() {
  ptCanvas.width = window.innerWidth;
  ptCanvas.height = window.innerHeight;
  ptCanvas.style.width = window.innerWidth + 'px';
  ptCanvas.style.height = window.innerHeight + 'px';
}

function sampleText(text) {
  const W = window.innerWidth, H = window.innerHeight;
  const off = document.createElement('canvas');
  off.width = W;
  off.height = H;
  const offCtx = off.getContext('2d');
  offCtx.fillStyle = '#fff';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.font = `bold ${Math.min(W / text.length * 1.5, H * 0.22)}px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif`;
  offCtx.fillText(text, W / 2, H / 2, W * 0.85);

  const imageData = offCtx.getImageData(0, 0, W, H);
  const pixels = imageData.data;
  const step = 5;
  const points = [];
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      if (pixels[(y * W + x) * 4 + 3] > 60) {
        points.push({ tx: x, ty: y });
      }
    }
  }
  return points;
}

class PtParticle {
  constructor(w, h, tx, ty) {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.tx = tx;
    this.ty = ty;
  }
}

function showText(index) {
  if (index >= ptTexts.length) return;

  const sample = sampleText(ptTexts[index]);
  if (sample.length === 0) return;

  const shuffled = [...sample].sort(() => Math.random() - 0.5);

  ptParticles = [];
  const W = window.innerWidth, H = window.innerHeight;
  for (let i = 0; i < shuffled.length; i++) {
    ptParticles.push(new PtParticle(W, H, shuffled[i].tx, shuffled[i].ty));
  }

  if (index + 1 < ptTexts.length) {
    // Not last text: scatter then transition
    ptTimers.push(setTimeout(() => {
      for (const p of ptParticles) {
        p.tx = (Math.random() - 0.5) * W * 2 + W / 2;
        p.ty = (Math.random() - 0.5) * H * 2 + H / 2;
      }
      ptTimers.push(setTimeout(() => showText(index + 1), 600));
    }, 2000));
  } else {
    // Last text: hold forever (or until user leaves page)
    ptTimers.push(setTimeout(() => { ptActive = false; }, 8000));
  }
}

function animatePT() {
  if (!ptActive) return;

  ptCtx.clearRect(0, 0, ptCanvas.width, ptCanvas.height);

  const dotSize = 3;
  for (const p of ptParticles) {
    p.x += (p.tx - p.x) * 0.05;
    p.y += (p.ty - p.y) * 0.05;

    const dist = Math.hypot(p.tx - p.x, p.ty - p.y);
    let alpha = dist > 100 ? 0.3 : dist > 40 ? 0.3 + 0.7 * (1 - (dist - 40) / 60) : 1;

    ptCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    ptCtx.fillRect(p.x - dotSize / 2, p.y - dotSize / 2, dotSize, dotSize);
  }

  requestAnimationFrame(animatePT);
}

function startParticleText() {
  if (ptActive) return;
  ptActive = true;
  resizePT();
  showText(0);
  animatePT();
}

function stopParticleText() {
  ptActive = false;
  ptParticles = [];
  ptTimers.forEach(clearTimeout);
  ptTimers.length = 0;
}

// ==================== Page 3: Canvas Meteor Shower ====================
const meteorBg = document.getElementById('meteorBg');
const meteorBgCtx = meteorBg.getContext('2d');
let meteorBgRafId = null;

let W, H;
function resizeMeteorBg() {
  W = meteorBg.width = window.innerWidth;
  H = meteorBg.height = window.innerHeight;
  initMeteorBg();
  buildConstellations();
}

// ---- Pre-rendered layers ----
let milkyWay = null;
function drawMilkyWay() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const gradient = octx.createLinearGradient(0, 0, W, H);
  gradient.addColorStop(0, 'rgba(30,20,60,0)');
  gradient.addColorStop(0.35, 'rgba(40,30,80,0.15)');
  gradient.addColorStop(0.5, 'rgba(50,40,100,0.25)');
  gradient.addColorStop(0.55, 'rgba(60,50,120,0.22)');
  gradient.addColorStop(0.7, 'rgba(40,30,80,0.08)');
  gradient.addColorStop(1, 'rgba(20,15,50,0)');
  octx.fillStyle = gradient;
  octx.fillRect(0, 0, W, H);
  for (let i = 0; i < 3; i++) {
    const y0 = H * (0.3 + i * 0.2);
    const wisp = octx.createLinearGradient(0, y0 - 60, 0, y0 + 60);
    wisp.addColorStop(0, 'rgba(30,20,60,0)');
    wisp.addColorStop(0.5, 'rgba(70,50,130,0.12)');
    wisp.addColorStop(1, 'rgba(30,20,60,0)');
    octx.fillStyle = wisp;
    octx.beginPath();
    octx.moveTo(0, y0 - 50 + Math.sin(i * 2) * 30);
    for (let x = 0; x < W; x += 20) octx.lineTo(x, y0 + Math.sin(x * 0.004 + i) * 40);
    octx.lineTo(W, y0 + 50); octx.lineTo(0, y0 + 50);
    octx.closePath(); octx.fill();
  }
  return off;
}

let moonGlow = null;
function drawMoonGlow() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const mx = W * 0.78, my = H * 0.18;
  const radius = Math.min(W, H) * 0.25;
  const glow = octx.createRadialGradient(mx, my, radius * 0.15, mx, my, radius);
  glow.addColorStop(0, 'rgba(200,210,255,0.12)');
  glow.addColorStop(0.3, 'rgba(180,200,240,0.06)');
  glow.addColorStop(0.6, 'rgba(140,170,220,0.02)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = glow;
  octx.beginPath(); octx.arc(mx, my, radius, 0, Math.PI * 2); octx.fill();
  const halo = octx.createRadialGradient(mx, my, radius * 0.7, mx, my, radius * 1.2);
  halo.addColorStop(0, 'rgba(0,0,0,0)');
  halo.addColorStop(0.5, 'rgba(170,190,230,0.04)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = halo;
  octx.beginPath(); octx.arc(mx, my, radius * 1.2, 0, Math.PI * 2); octx.fill();
  return off;
}

let nebulae = [];
function drawNebulae() {
  nebulae = [];
  const positions = [
    { x: W * 0.15, y: H * 0.25, r: Math.min(W, H) * 0.22, color: [80, 40, 140] },
    { x: W * 0.75, y: H * 0.55, r: Math.min(W, H) * 0.18, color: [40, 30, 100] },
    { x: W * 0.5, y: H * 0.7, r: Math.min(W, H) * 0.2, color: [60, 20, 90] },
    { x: W * 0.3, y: H * 0.5, r: Math.min(W, H) * 0.16, color: [30, 50, 120] },
    { x: W * 0.85, y: H * 0.35, r: Math.min(W, H) * 0.15, color: [70, 35, 110] },
  ];
  positions.forEach(p => {
    const off = document.createElement('canvas');
    off.width = p.r * 2; off.height = p.r * 2;
    const octx = off.getContext('2d');
    const cx = p.r, cy = p.r;
    const [r, gv, b] = p.color;
    const g = octx.createRadialGradient(cx, cy, 0, cx, cy, p.r);
    g.addColorStop(0, `rgba(${r},${gv},${b},0.1)`);
    g.addColorStop(0.4, `rgba(${r},${gv},${b},0.05)`);
    g.addColorStop(0.7, `rgba(${r},${gv},${b},0.015)`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    octx.fillStyle = g;
    octx.beginPath(); octx.arc(cx, cy, p.r, 0, Math.PI * 2); octx.fill();
    const g2 = octx.createRadialGradient(cx - p.r * 0.2, cy + p.r * 0.15, 0, cx - p.r * 0.2, cy + p.r * 0.15, p.r * 0.8);
    g2.addColorStop(0, `rgba(${r + 30},${gv + 10},${b + 20},0.06)`);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    octx.fillStyle = g2;
    octx.beginPath(); octx.arc(cx - p.r * 0.2, cy + p.r * 0.15, p.r * 0.8, 0, Math.PI * 2); octx.fill();
    nebulae.push({ canvas: off, x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2 });
  });
}

// ---- Stars ----
const stars = [];
const STAR_COUNT = 250;
let constellations = [];
function buildConstellations() {
  constellations = [];
  const bright = [];
  stars.forEach((s, i) => { if (s.r > 1.0) bright.push(i); });
  const used = new Set();
  const maxDist = Math.min(W, H) * 0.18;
  for (let i = 0; i < bright.length; i++) {
    if (used.has(bright[i])) continue;
    const group = [bright[i]];
    used.add(bright[i]);
    for (let j = i + 1; j < bright.length; j++) {
      if (used.has(bright[j])) continue;
      if (group.length >= 5) break;
      let closeEnough = false;
      for (const gi of group) {
        const dx = stars[gi].x - stars[bright[j]].x;
        const dy = stars[gi].y - stars[bright[j]].y;
        if (Math.sqrt(dx * dx + dy * dy) < maxDist) { closeEnough = true; break; }
      }
      if (closeEnough) { group.push(bright[j]); used.add(bright[j]); }
    }
    if (group.length >= 3) {
      const path = [group[0]];
      const remaining = group.slice(1);
      while (remaining.length > 0) {
        const last = path[path.length - 1];
        let nearest = 0, nearestDist = Infinity;
        for (let k = 0; k < remaining.length; k++) {
          const dx = stars[last].x - stars[remaining[k]].x;
          const dy = stars[last].y - stars[remaining[k]].y;
          const d = dx * dx + dy * dy;
          if (d < nearestDist) { nearestDist = d; nearest = k; }
        }
        path.push(remaining[nearest]);
        remaining.splice(nearest, 1);
      }
      constellations.push({ stars: path });
    }
  }
}

function initStars() {
  stars.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      twinkleSpeed: 0.008 + Math.random() * 0.035,
      twinklePhase: Math.random() * Math.PI * 2,
      baseAlpha: 0.25 + Math.random() * 0.75,
      color: Math.random() < 0.8 ? '#ffffff' : (Math.random() < 0.5 ? '#c8d8ff' : '#ffe0c0')
    });
  }
  buildConstellations();
}

// ---- Meteors ----
const meteors = [];
const afterglows = [];
const smokeRings = [];
const METEOR_TRAIL_LEN = 70;

function spawnMeteor(x, y, angle, isFireball) {
  if (x == null) {
    x = Math.random() * W;
    y = Math.random() * H * 0.35;
    angle = (Math.PI * 0.22) + Math.random() * Math.PI * 0.2;
  }
  if (isFireball) {
    meteors.push({
      x, y, vx: Math.cos(angle) * (9 + Math.random() * 18), vy: Math.sin(angle) * (9 + Math.random() * 18),
      life: 50 + Math.random() * 60, maxLife: 0, trail: [],
      thickness: 2.5 + Math.random() * 3.5,
      color: Math.random() < 0.5 ? '#ffe8a0' : '#ffcc66',
      sparks: [], isFireball: true
    });
    meteors[meteors.length - 1].maxLife = meteors[meteors.length - 1].life;
  } else {
    const colors = ['#ffffff', '#ffffff', '#c8e0ff', '#ffeedd', '#e8d0ff'];
    meteors.push({
      x, y, vx: Math.cos(angle) * (5 + Math.random() * 14), vy: Math.sin(angle) * (5 + Math.random() * 14),
      life: 35 + Math.random() * 65, maxLife: 0, trail: [],
      thickness: 0.6 + Math.random() * 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      sparks: [], isFireball: false
    });
    meteors[meteors.length - 1].maxLife = meteors[meteors.length - 1].life;
  }
}

// ---- Dust ----
const dust = [];
const DUST_COUNT = 100;
function initDust() {

  for (let i = 0; i < DUST_COUNT; i++) {
    dust.push({
      x: Math.random() * W, y: Math.random() * H,

      vx: (Math.random() - 0.5) * 0.12, vy: -0.04 - Math.random() * 0.2,

    });

// ---- Fireflies ----
const fireflies = [];

function initFireflies() {

  for (let i = 0; i < FIREFLY_COUNT; i++) {
    fireflies.push({

      vx: (Math.random() - 0.5) * 0.3, vy: -0.08 - Math.random() * 0.35,

    });

// ---- Burst ----
let burstCooldown = 0;
const burstParticles = [];

function triggerBurst() {
  const rx = Math.random() * W;
  const ry = Math.random() * H * 0.2;
  const baseAngle = (Math.PI * 0.22) + Math.random() * Math.PI * 0.2;
  const spread = 0.04 + Math.random() * 0.06;
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const a = baseAngle + (Math.random() - 0.5) * spread;
    const dist = Math.random() * 30;
    setTimeout(() => {
      spawnMeteor(rx + Math.cos(a) * dist, ry + Math.sin(a) * dist, a, false);
    }, i * 50 + Math.random() * 200);
  }
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 0.2 + Math.random() * 0.8;
    burstParticles.push({
      x: rx, y: ry, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 30 + Math.random() * 40, maxLife: 70
    });
  }
}

// ---- Aurora ----
function drawAurora(t) {
  const bands = [
    { yFrac: 0.06, color: [70, 255, 140], amp: 35, freq: 0.003, speed: 0.4, alpha: 0.06 },
    { yFrac: 0.12, color: [80, 255, 210], amp: 45, freq: 0.0025, speed: 0.3, alpha: 0.05 },
    { yFrac: 0.19, color: [140, 100, 255], amp: 30, freq: 0.0035, speed: 0.5, alpha: 0.04 },
    { yFrac: 0.08, color: [180, 220, 255], amp: 25, freq: 0.004, speed: 0.35, alpha: 0.04 },
  ];
  bands.forEach(band => {
    const baseY = H * band.yFrac;
    meteorBgCtx.beginPath();
    meteorBgCtx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 3) {
      let y = baseY;
      y += Math.sin(x * band.freq + t * band.speed) * band.amp;
      y += Math.sin(x * band.freq * 2.3 - t * band.speed * 0.7) * band.amp * 0.5;
      y += Math.sin(x * band.freq * 0.4 + t * band.speed * 1.3) * band.amp * 0.35;
      meteorBgCtx.lineTo(x, y);
    }
    const grad = meteorBgCtx.createLinearGradient(0, baseY - band.amp * 1.5, 0, baseY + band.amp * 1.5);
    const [r, g, b] = band.color;
    grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
    grad.addColorStop(0.3, `rgba(${r},${g},${b},${band.alpha})`);
    grad.addColorStop(0.6, `rgba(${r},${g},${b},${band.alpha * 0.4})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    meteorBgCtx.strokeStyle = grad;
    meteorBgCtx.lineWidth = band.amp * 2.5;
    meteorBgCtx.stroke();
  });
}

function initMeteorBg() {
  milkyWay = drawMilkyWay();
  moonGlow = drawMoonGlow();
  drawNebulae();
}

let m3FrameCount = 0;
let meteorTimer = 0;
let fireballTimer = 0;

function drawMeteorBg() {
  meteorBgRafId = requestAnimationFrame(drawMeteorBg);
  m3FrameCount++;
  const t = m3FrameCount * 0.016;
  const ctx = meteorBgCtx;

  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(milkyWay, 0, 0);
  nebulae.forEach(n => { ctx.drawImage(n.canvas, n.x, n.y, n.w, n.h); });
  ctx.drawImage(moonGlow, 0, 0);
  drawAurora(t);

  // Constellation lines
  constellations.forEach(c => {
    const ca = 0.06 + Math.sin(t * 0.8) * 0.02;
    ctx.strokeStyle = `rgba(180,200,240,${ca})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    const first = stars[c.stars[0]];
    ctx.moveTo(first.x, first.y);
    for (let k = 1; k < c.stars.length; k++) {
      const s = stars[c.stars[k]];
      ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();
  });

  // Afterglows
  for (let i = afterglows.length - 1; i >= 0; i--) {
    const ag = afterglows[i];
    ag.alpha -= 0.003;
    if (ag.alpha <= 0) { afterglows.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.moveTo(ag.x1, ag.y1);
    ctx.lineTo(ag.x2, ag.y2);
    ctx.strokeStyle = `rgba(255,255,255,${ag.alpha * 0.15})`;
    ctx.lineWidth = ag.thickness;
    ctx.stroke();
  }

  // Smoke rings
  for (let i = smokeRings.length - 1; i >= 0; i--) {
    const sr = smokeRings[i];
    sr.radius += 0.15;
    sr.alpha -= 0.006;
    if (sr.alpha <= 0) { smokeRings.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(sr.x, sr.y, sr.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,140,${sr.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = `rgba(255,180,100,${sr.alpha * 0.15})`;
    ctx.fill();
  }

  // Dust
  dust.forEach(d => {
    d.x += d.vx; d.y += d.vy;
    if (d.x < -10) d.x = W + 10;
    if (d.x > W + 10) d.x = -10;
    if (d.y < -10) d.y = H + 10;
    if (d.y > H + 10) d.y = -10;
    const a = d.alpha + Math.sin(t * 1.5 + d.phase) * 0.12;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(170,190,240,${Math.max(0, a)})`;
    ctx.fill();
  });

  // Fireflies
  fireflies.forEach(f => {
    f.x += f.vx + Math.sin(t * 2 + f.phase) * 0.15;
    f.y += f.vy + Math.cos(t * 1.7 + f.phase) * 0.1;
    if (f.x < -20) f.x = W + 20;
    if (f.x > W + 20) f.x = -20;
    if (f.y < H * 0.5) { f.y = H + 10; f.x = Math.random() * W; }
    if (f.y > H + 20) { f.y = H * 0.5 + Math.random() * 10; f.x = Math.random() * W; }
    const pulse = 0.5 + 0.5 * Math.sin(t * f.speed * 60 + f.phase);
    const a = f.alpha * pulse;
    const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 5);
    glow.addColorStop(0, `rgba(255,220,140,${a * 0.5})`);
    glow.addColorStop(0.4, `rgba(255,180,80,${a * 0.2})`);
    glow.addColorStop(1, 'rgba(255,140,40,0)');
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = glow; ctx.fill();
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,230,170,${a})`; ctx.fill();
  });

  // Stars
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 60 + s.twinklePhase);
    const alpha = s.baseAlpha * twinkle;
    let color;
    if (s.color === '#c8d8ff') color = `rgba(200,216,255,${alpha})`;
    else if (s.color === '#ffe0c0') color = `rgba(255,224,192,${alpha})`;
    else color = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();

    if (s.r > 1.3 && twinkle > 0.82) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
      glow.addColorStop(0, 'rgba(255,255,255,0.35)');
      glow.addColorStop(0.5, 'rgba(200,220,255,0.08)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = glow; ctx.fill();
    }

    // Cross flare
    if (s.r > 1.5 && twinkle > 0.88) {
      const flareAlpha = (twinkle - 0.88) / 0.12 * alpha * 0.45;
      const flareLen = s.r * 7, flareW = s.r * 0.6;
      const hGrad = ctx.createLinearGradient(s.x - flareLen, s.y, s.x + flareLen, s.y);
      hGrad.addColorStop(0, 'rgba(255,255,255,0)');
      hGrad.addColorStop(0.4, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(0.5, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(0.6, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hGrad;
      ctx.fillRect(s.x - flareLen, s.y - flareW, flareLen * 2, flareW * 2);
      const vGrad = ctx.createLinearGradient(s.x, s.y - flareLen, s.x, s.y + flareLen);
      vGrad.addColorStop(0, 'rgba(255,255,255,0)');
      vGrad.addColorStop(0.4, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(0.5, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(0.6, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = vGrad;
      ctx.fillRect(s.x - flareW, s.y - flareLen, flareW * 2, flareLen * 2);
    }
  });

  // Burst particles
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const bp = burstParticles[i];
    bp.x += bp.vx; bp.y += bp.vy; bp.life--;
    if (bp.life <= 0) { burstParticles.splice(i, 1); continue; }
    const progress = bp.life / bp.maxLife;
    const a = progress < 0.15 ? progress / 0.15 : 1;
    ctx.beginPath(); ctx.arc(bp.x, bp.y, 1.2 * a, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${a})`; ctx.fill();
  }

  // Spawn logic
  meteorTimer++;
  if (meteorTimer > 35 + Math.random() * 70 && meteors.length < 3) {
    meteorTimer = 0;
    if (Math.random() < 0.25 && burstCooldown <= 0) {
      triggerBurst();
      burstCooldown = 200 + Math.random() * 300;
    } else {
      spawnMeteor(null, null, null, false);
    }
  }
  if (burstCooldown > 0) burstCooldown--;

  fireballTimer++;
  if (fireballTimer > 600 + Math.random() * 540) {
    fireballTimer = 0;
    const fx = Math.random() * W, fy = Math.random() * H * 0.25;
    const fa = (Math.PI * 0.2) + Math.random() * Math.PI * 0.22;
    spawnMeteor(fx, fy, fa, true);
  }

  // Meteors
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx; m.y += m.vy; m.life--;
    const trailLen = m.isFireball ? 120 : METEOR_TRAIL_LEN;
    m.trail.unshift({ x: m.x, y: m.y });
    if (m.trail.length > trailLen) m.trail.length = trailLen;

    const sparkRate = m.isFireball ? 0.95 : 0.7;
    const sparkCount = m.isFireball ? 3 : 1;
    if (m.life > 0 && Math.random() < sparkRate) {
      for (let s = 0; s < sparkCount; s++) {
        m.sparks.push({
          x: m.x, y: m.y,
          vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
          life: 8 + Math.random() * 12, maxLife: 20
        });
      }
    }

    for (let si = m.sparks.length - 1; si >= 0; si--) {
      const sp = m.sparks[si];
      sp.x += sp.vx; sp.y += sp.vy; sp.life--;
      if (sp.life <= 0) { m.sparks.splice(si, 1); continue; }
      const sa = sp.life / sp.maxLife;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, (m.isFireball ? 1.2 : 0.8) * sa, 0, Math.PI * 2);
      ctx.fillStyle = m.isFireball ? `rgba(255,220,140,${sa})` : `rgba(255,240,220,${sa})`;
      ctx.fill();
    }

    if (m.life <= 0) {
      if (m.trail.length > 2) {
        afterglows.push({
          x1: m.trail[0].x, y1: m.trail[0].y,
          x2: m.trail[m.trail.length - 1].x, y2: m.trail[m.trail.length - 1].y,
          alpha: m.isFireball ? 1.5 : 1, thickness: m.thickness
        });
      }
      if (m.isFireball) {
        smokeRings.push({ x: m.x, y: m.y, radius: m.thickness * 3, alpha: 0.3 });
      }
      meteors.splice(i, 1);
      continue;
    }

    const progress = m.life / m.maxLife;
    const alpha = progress < 0.08 ? progress / 0.08 : (progress > 0.85 ? (1 - progress) / 0.15 : 1);

    if (m.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(m.trail[0].x, m.trail[0].y);
      for (let j = 1; j < m.trail.length; j++) ctx.lineTo(m.trail[j].x, m.trail[j].y);
      const grad = ctx.createLinearGradient(
        m.trail[0].x, m.trail[0].y,
        m.trail[m.trail.length - 1].x, m.trail[m.trail.length - 1].y
      );
      if (m.isFireball) {
        grad.addColorStop(0, `rgba(255,240,180,${alpha})`);
        grad.addColorStop(0.2, `rgba(255,200,100,${alpha * 0.7})`);
        grad.addColorStop(0.5, `rgba(255,150,60,${alpha * 0.3})`);
        grad.addColorStop(1, 'rgba(255,100,30,0)');
      } else {
        grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
        grad.addColorStop(0.25, `rgba(220,230,255,${alpha * 0.65})`);
        grad.addColorStop(0.6, `rgba(180,200,240,${alpha * 0.2})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
      }
      ctx.strokeStyle = grad;
      ctx.lineWidth = m.thickness * alpha;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    const glowRadius = m.isFireball ? m.thickness * 8 : m.thickness * 5;
    const headGlow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, glowRadius);
    if (m.isFireball) {
      headGlow.addColorStop(0, `rgba(255,240,200,${alpha})`);
      headGlow.addColorStop(0.2, `rgba(255,200,120,${alpha * 0.6})`);
      headGlow.addColorStop(0.5, `rgba(255,150,60,${alpha * 0.25})`);
      headGlow.addColorStop(1, 'rgba(255,100,30,0)');
    } else {
      headGlow.addColorStop(0, `rgba(255,255,255,${alpha})`);
      headGlow.addColorStop(0.3, `rgba(220,230,255,${alpha * 0.55})`);
      headGlow.addColorStop(1, 'rgba(255,255,255,0)');
    }
    ctx.beginPath(); ctx.arc(m.x, m.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = headGlow; ctx.fill();
  }
}

// Glow texture helper
function makeGlow(r, g, b, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.12, `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},0.25)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

const texPink = makeGlow(255, 130, 175, 64);
const texWhite = makeGlow(255, 255, 255, 64);
const texYellow = makeGlow(255, 210, 80, 32);
const texPale = makeGlow(255, 185, 205, 64);
const texHotPink = makeGlow(255, 100, 150, 48);

// Particle helpers
function cylSurf(r, y0, y1, n, cx, cz) {
  const pts = [], h = y1 - y0;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const t = Math.random();
    const y = t < 0.18 ? y0 + Math.random() * h * 0.06 :
              t < 0.36 ? y1 - Math.random() * h * 0.06 :
              y0 + Math.random() * h;
    pts.push(cx + Math.cos(a) * r, y, cz + Math.sin(a) * r);
  }
  return pts;
}

function disc(r, y, n, ir, cx, cz) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const rad = (ir || 0) + Math.sqrt(Math.random()) * (r - (ir || 0));
    pts.push(cx + Math.cos(a) * rad, y, cz + Math.sin(a) * rad);
  }
  return pts;
}

function ring(r, y, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    pts.push(Math.cos(a) * r, y, Math.sin(a) * r);
  }
  return pts;
}

function flamePts(cx, y0, cz, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.05;
    const y = y0 + Math.random() * 0.28;
    const s = Math.max(0.08, 1 - (y - y0) / 0.28);
    pts.push(cx + Math.cos(a) * r * s, y, cz + Math.sin(a) * r * s);
  }
  return pts;
}

const cakePartsArr = []; // { mesh, base: Float32Array } for scatter animation

function mkPoints(positions, color, size, tex) {
  const geo = new THREE.BufferGeometry();
  const arr = new Float32Array(positions);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(arr, 3));
  const mat = new THREE.PointsMaterial({
    color, size, map: tex, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true,
  });
  const mesh = new THREE.Points(geo, mat);
  cakePartsArr.push({ mesh, base: new Float32Array(arr) });
  return mesh;
}

// --- Wish / Blow Detection ---
let cake4Active = false;
let wishPhase = 'idle'; // idle | blowOut | showText | scatter
let phaseStart = 0;
const BLOWOUT_DURATION = 1.5;
const SHOWTEXT_DURATION = 3.0;

function triggerWish() {
  if (wishPhase !== 'idle') return;
  wishPhase = 'blowOut';
  phaseStart = performance.now();

  // Hide hint
  const hint = document.querySelector('.wish-hint');
  if (hint) hint.style.opacity = '0';


}

function animateCake4() {
  if (!cake4Active) return;
  requestAnimationFrame(animateCake4);
  const t = performance.now() * 0.001;

  if (wishPhase === 'idle') {
    // Normal rotation
    cake4Group.rotation.y += 0.004;

    // Animate flames
    flameGeos.forEach((f) => {
      const { cx, cz, baseY } = f.userData;
      const arr = f.geometry.attributes.position.array;
      for (let i = 0; i < arr.length; i += 3) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.05;
        const yOff = Math.random() * 0.28;
        const s = Math.max(0.08, 1 - yOff / 0.28);
        arr[i] = cx + Math.cos(a) * r * s;
        arr[i + 1] = baseY + yOff + Math.sin(t * 15 + i) * 0.015;
        arr[i + 2] = cz + Math.sin(a) * r * s;
      }
      f.geometry.attributes.position.needsUpdate = true;
    });
  } else if (wishPhase === 'blowOut') {
    const elapsed = (performance.now() - phaseStart) / 1000;
    const progress = Math.min(elapsed / BLOWOUT_DURATION, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    // Slow rotation
    cake4Group.rotation.y += 0.003;

    // Flames shrink, flicker wildly, fade out
    flameGeos.forEach((f) => {
      const { cx, cz, baseY } = f.userData;
      const arr = f.geometry.attributes.position.array;
      const flameH = 0.28 * (1 - ease);
      for (let i = 0; i < arr.length; i += 3) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.05 * (1 + ease * 4);
        const yOff = Math.random() * Math.max(0.01, flameH);
        const s = Math.max(0.02, 1 - yOff / 0.28);
        arr[i] = cx + Math.cos(a) * r * s + (Math.random() - 0.5) * ease * 0.2;
        arr[i + 1] = baseY + yOff + Math.sin(t * 25 + i) * 0.04 * (1 + ease);
        arr[i + 2] = cz + Math.sin(a) * r * s + (Math.random() - 0.5) * ease * 0.2;
      }
      f.geometry.attributes.position.needsUpdate = true;
      f.material.opacity = 1 - ease;
    });

    if (progress >= 1) {
      wishPhase = 'showText';
      phaseStart = performance.now();
      const el = document.getElementById('wishSuccess');
      if (el) el.classList.add('show');
      startCelebration();
    }
  } else if (wishPhase === 'showText') {
    const elapsed = (performance.now() - phaseStart) / 1000;
    cake4Group.rotation.y += 0.002;

    if (elapsed >= SHOWTEXT_DURATION) {
      wishPhase = 'done';
      const btn = document.getElementById('cardOpenBtn');
      if (btn) btn.classList.add('show');
    }
  } else if (wishPhase === 'done') {
    cake4Group.rotation.y += 0.003;
  }

  cake4Renderer.render(cake4Scene, cake4Camera);
}

function startCake4() {
  cake4Active = true;
  wishPhase = 'idle';
  phaseStart = 0;
  cake4Group.rotation.y = 0;

  // Reset all particles to base positions
  cakePartsArr.forEach(part => {
    const arr = part.mesh.geometry.attributes.position.array;
    arr.set(part.base);
    part.mesh.geometry.attributes.position.needsUpdate = true;
    part.mesh.material.opacity = 1;
  });
  // Reset flames
  flameGeos.forEach(f => { f.material.opacity = 1; f.visible = true; });
  // Reset hint
  const hint = document.querySelector('.wish-hint');
  if (hint) hint.style.opacity = '';
  // Reset wish text
  const el = document.getElementById('wishSuccess');
  if (el) el.classList.remove('show');
  // Reset card button
  const cardBtn = document.getElementById('cardOpenBtn');
  if (cardBtn) cardBtn.classList.remove('show');
  // Reset card overlay
  const overlay = document.getElementById('cardOverlay');
  if (overlay) overlay.classList.remove('show');

  stopCelebration();
  animateCake4();
  setupCake4Mic();
}

function stopCake4() { cake4Active = false; stopCelebration(); }

  if (e.target.id === 'cardCloseBtn' || e.target.id === 'cardOverlay') {
    const overlay = document.getElementById('cardOverlay');
    if (overlay) overlay.classList.remove('show');
  }
});

// Click to wish
cake4Container.addEventListener('click', () => triggerWish());

// Mic blow detection
async function setupCake4Mic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function checkBlow() {
      if (wishPhase !== 'idle') { stream.getTracks().forEach(t => t.stop()); return; }
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      if (avg > 20) triggerWish();
      if (wishPhase === 'idle') requestAnimationFrame(checkBlow);
    }
    checkBlow();
  } catch (e) {
    // Mic not available — click fallback works
  }
}

// ==================== Page 4: Celebration Particles ====================
const celebCanvas = document.getElementById('celebrationCanvas');
const celebCtx = celebCanvas.getContext('2d');
let celebActive = false;
let celebParticles = [];
const celebColors = [
  'rgb(255,130,175)', 'rgb(255,150,195)', 'rgb(255,110,160)',
  'rgb(255,100,180)', 'rgb(255,160,200)', 'rgb(255,140,185)',
  'rgb(195,120,255)', 'rgb(175,100,240)', 'rgb(210,140,255)',
  'rgb(185,110,250)', 'rgb(200,130,255)', 'rgb(160,90,230)',
];

function resizeCeleb() {
  celebCanvas.width = window.innerWidth * dpr;
  celebCanvas.height = window.innerHeight * dpr;
  celebCanvas.style.width = window.innerWidth + 'px';
  celebCanvas.style.height = window.innerHeight + 'px';
}

class CelebParticle {
  constructor(initial) {
    this.x = Math.random() * window.innerWidth;
    this.y = initial ? Math.random() * window.innerHeight : window.innerHeight + Math.random() * 50;
    this.size = 3.5 + Math.random() * 6;
    this.speedY = 0.25 + Math.random() * 0.65;
    this.speedX = (Math.random() - 0.5) * 0.35;
    this.phase = Math.random() * Math.PI * 2;
    this.freq = 0.008 + Math.random() * 0.018;
    this.color = celebColors[Math.floor(Math.random() * celebColors.length)];
    this.twinkleSpd = 0.015 + Math.random() * 0.04;
    this.twinklePh = Math.random() * Math.PI * 2;
  }
  reset() {
    this.x = Math.random() * window.innerWidth;
    this.y = window.innerHeight + Math.random() * 50;
    this.size = 3.5 + Math.random() * 6;
    this.speedY = 0.25 + Math.random() * 0.65;
    this.speedX = (Math.random() - 0.5) * 0.35;
    this.color = celebColors[Math.floor(Math.random() * celebColors.length)];
  }
}

function spawnCelebParticles(n) {
  for (let i = 0; i < n; i++) celebParticles.push(new CelebParticle(true));
}

function animateCeleb() {
  if (!celebActive) return;

  celebCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  celebCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  for (const p of celebParticles) {
    p.y -= p.speedY;
    p.x += Math.sin(p.phase) * 0.4 + p.speedX;
    p.phase += p.freq;
    p.twinklePh += p.twinkleSpd;
    if (p.y < -30) p.reset();

    const alpha = 0.25 + 0.5 * (0.5 + 0.5 * Math.sin(p.twinklePh));
    const grad = celebCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2.5);
    grad.addColorStop(0, p.color);
    grad.addColorStop(0.25, p.color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    celebCtx.globalAlpha = alpha;
    celebCtx.fillStyle = grad;
    celebCtx.beginPath();
    celebCtx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
    celebCtx.fill();
  }
  celebCtx.globalAlpha = 1;

  requestAnimationFrame(animateCeleb);
}

function startCelebration() {
  if (celebActive) return;
  celebActive = true;
  resizeCeleb();
  celebParticles = [];
  spawnCelebParticles(70);
  animateCeleb();
}

function stopCelebration() {
  celebActive = false;
  celebParticles = [];
}
