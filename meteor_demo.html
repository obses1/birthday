<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流星雨背景预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #06061a 0%, #0f0c2d 40%, #1a1030 70%, #0d1028 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  canvas { position: fixed; top: 0; left: 0; z-index: 0; }
  .overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .overlay p {
    color: rgba(255,255,255,0.85);
    font-size: 1.1rem; line-height: 2.2;
    letter-spacing: 0.06em;
    text-shadow: 0 0 10px rgba(200,200,255,0.6), 0 0 2px rgba(0,0,0,0.8);
    opacity: 0; transition: opacity 1s ease;
  }
  .overlay p.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="overlay">
  <p class="show">愿你的21岁，像这一刻的流星一样闪耀</p>
  <p class="show">好事追着你，幸福围着你</p>
  <p class="show">晓娜，生日快乐啊</p>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Milky Way glow band ----
let milkyWay = null;
function drawMilkyWay() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');

  const gradient = octx.createLinearGradient(0, 0, W, H);
  gradient.addColorStop(0, 'rgba(30,20,60,0)');
  gradient.addColorStop(0.35, 'rgba(40,30,80,0.15)');
  gradient.addColorStop(0.5, 'rgba(50,40,100,0.25)');
  gradient.addColorStop(0.55, 'rgba(60,50,120,0.22)');
  gradient.addColorStop(0.7, 'rgba(40,30,80,0.08)');
  gradient.addColorStop(1, 'rgba(20,15,50,0)');
  octx.fillStyle = gradient;
  octx.fillRect(0, 0, W, H);

  for (let i = 0; i < 3; i++) {
    const y0 = H * (0.3 + i * 0.2);
    const wisp = octx.createLinearGradient(0, y0 - 60, 0, y0 + 60);
    wisp.addColorStop(0, 'rgba(30,20,60,0)');
    wisp.addColorStop(0.5, 'rgba(70,50,130,0.12)');
    wisp.addColorStop(1, 'rgba(30,20,60,0)');
    octx.fillStyle = wisp;
    octx.beginPath();
    octx.moveTo(0, y0 - 50 + Math.sin(i * 2) * 30);
    for (let x = 0; x < W; x += 20) {
      octx.lineTo(x, y0 + Math.sin(x * 0.004 + i) * 40);
    }
    octx.lineTo(W, y0 + 50);
    octx.lineTo(0, y0 + 50);
    octx.closePath();
    octx.fill();
  }
  return off;
}

// ---- Moon glow (pre-rendered) ----
let moonGlow = null;
function drawMoonGlow() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');

  const mx = W * 0.78;
  const my = H * 0.18;
  const radius = Math.min(W, H) * 0.25;

  const glow = octx.createRadialGradient(mx, my, radius * 0.15, mx, my, radius);
  glow.addColorStop(0, 'rgba(200,210,255,0.12)');
  glow.addColorStop(0.3, 'rgba(180,200,240,0.06)');
  glow.addColorStop(0.6, 'rgba(140,170,220,0.02)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = glow;
  octx.beginPath();
  octx.arc(mx, my, radius, 0, Math.PI * 2);
  octx.fill();

  const halo = octx.createRadialGradient(mx, my, radius * 0.7, mx, my, radius * 1.2);
  halo.addColorStop(0, 'rgba(0,0,0,0)');
  halo.addColorStop(0.5, 'rgba(170,190,230,0.04)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = halo;
  octx.beginPath();
  octx.arc(mx, my, radius * 1.2, 0, Math.PI * 2);
  octx.fill();

  return off;
}

// ---- Nebula clusters (pre-rendered) ----
let nebulae = [];
function drawNebulae() {
  nebulae = [];
  const positions = [
    { x: W * 0.15, y: H * 0.25, r: Math.min(W, H) * 0.22, color: [80, 40, 140] },
    { x: W * 0.75, y: H * 0.55, r: Math.min(W, H) * 0.18, color: [40, 30, 100] },
    { x: W * 0.5, y: H * 0.7, r: Math.min(W, H) * 0.2, color: [60, 20, 90] },
    { x: W * 0.3, y: H * 0.5, r: Math.min(W, H) * 0.16, color: [30, 50, 120] },
    { x: W * 0.85, y: H * 0.35, r: Math.min(W, H) * 0.15, color: [70, 35, 110] },
  ];

  positions.forEach(p => {
    const off = document.createElement('canvas');
    off.width = p.r * 2; off.height = p.r * 2;
    const octx = off.getContext('2d');
    const cx = p.r, cy = p.r;

    const g = octx.createRadialGradient(cx, cy, 0, cx, cy, p.r);
    const [r, gv, b] = p.color;
    g.addColorStop(0, `rgba(${r},${gv},${b},0.1)`);
    g.addColorStop(0.4, `rgba(${r},${gv},${b},0.05)`);
    g.addColorStop(0.7, `rgba(${r},${gv},${b},0.015)`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    octx.fillStyle = g;
    octx.beginPath();
    octx.arc(cx, cy, p.r, 0, Math.PI * 2);
    octx.fill();

    const g2 = octx.createRadialGradient(cx - p.r * 0.2, cy + p.r * 0.15, 0, cx - p.r * 0.2, cy + p.r * 0.15, p.r * 0.8);
    g2.addColorStop(0, `rgba(${r + 30},${gv + 10},${b + 20},0.06)`);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    octx.fillStyle = g2;
    octx.beginPath();
    octx.arc(cx - p.r * 0.2, cy + p.r * 0.15, p.r * 0.8, 0, Math.PI * 2);
    octx.fill();

    nebulae.push({ canvas: off, x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2 });
  });
}

// ---- Stars ----
const stars = [];
const STAR_COUNT = 250;

// ---- Constellations (built from bright stars) ----
let constellations = [];
function buildConstellations() {
  constellations = [];
  // Pick bright stars (r > 1.0) as constellation candidates
  const bright = [];
  stars.forEach((s, i) => {
    if (s.r > 1.0) bright.push(i);
  });

  // Build groups of nearby bright stars
  const used = new Set();
  const maxDist = Math.min(W, H) * 0.18;

  for (let i = 0; i < bright.length; i++) {
    if (used.has(bright[i])) continue;
    const group = [bright[i]];
    used.add(bright[i]);
    for (let j = i + 1; j < bright.length; j++) {
      if (used.has(bright[j])) continue;
      if (group.length >= 5) break;
      // Check distance to any star already in group
      let closeEnough = false;
      for (const gi of group) {
        const dx = stars[gi].x - stars[bright[j]].x;
        const dy = stars[gi].y - stars[bright[j]].y;
        if (Math.sqrt(dx * dx + dy * dy) < maxDist) { closeEnough = true; break; }
      }
      if (closeEnough) {
        group.push(bright[j]);
        used.add(bright[j]);
      }
    }
    if (group.length >= 3) {
      // Connect stars in a path (nearest-neighbor chain)
      const path = [group[0]];
      const remaining = group.slice(1);
      while (remaining.length > 0) {
        const last = path[path.length - 1];
        let nearest = 0;
        let nearestDist = Infinity;
        for (let k = 0; k < remaining.length; k++) {
          const dx = stars[last].x - stars[remaining[k]].x;
          const dy = stars[last].y - stars[remaining[k]].y;
          const d = dx * dx + dy * dy;
          if (d < nearestDist) { nearestDist = d; nearest = k; }
        }
        path.push(remaining[nearest]);
        remaining.splice(nearest, 1);
      }
      constellations.push({ stars: path });
    }
  }
}

for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.8 + 0.3,
    twinkleSpeed: 0.008 + Math.random() * 0.035,
    twinklePhase: Math.random() * Math.PI * 2,
    baseAlpha: 0.25 + Math.random() * 0.75,
    color: Math.random() < 0.8 ? '#ffffff' : (Math.random() < 0.5 ? '#c8d8ff' : '#ffe0c0')
  });
}
buildConstellations();

// ---- Afterglow marks ----
const afterglows = [];

// ---- Fireball smoke rings ----
const smokeRings = [];

// ---- Meteors ----
const meteors = [];
const METEOR_TRAIL_LEN = 70;

function spawnMeteor(x, y, angle, isFireball) {
  if (x == null) {
    x = Math.random() * W;
    y = Math.random() * H * 0.35;
    angle = (Math.PI * 0.22) + Math.random() * Math.PI * 0.2;
  }
  if (isFireball) {
    const speed = 9 + Math.random() * 18;
    const life = 50 + Math.random() * 60;
    meteors.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      trail: [],
      thickness: 2.5 + Math.random() * 3.5,
      color: Math.random() < 0.5 ? '#ffe8a0' : '#ffcc66',
      sparks: [],
      isFireball: true
    });
  } else {
    const speed = 5 + Math.random() * 14;
    const life = 35 + Math.random() * 65;
    const thickness = 0.6 + Math.random() * 2;
    const colors = ['#ffffff', '#ffffff', '#c8e0ff', '#ffeedd', '#e8d0ff'];
    meteors.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      trail: [],
      thickness,
      color: colors[Math.floor(Math.random() * colors.length)],
      sparks: [],
      isFireball: false
    });
  }
}

// ---- Star dust ----
const dust = [];
const DUST_COUNT = 100;
for (let i = 0; i < DUST_COUNT; i++) {
  dust.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 0.3 + Math.random() * 0.7,
    vx: (Math.random() - 0.5) * 0.12,
    vy: -0.04 - Math.random() * 0.2,
    alpha: 0.15 + Math.random() * 0.35,
    phase: Math.random() * Math.PI * 2
  });
}

// ---- Fireflies (warm floating particles near bottom) ----
const fireflies = [];
const FIREFLY_COUNT = 28;
for (let i = 0; i < FIREFLY_COUNT; i++) {
  fireflies.push({
    x: Math.random() * W,
    y: H * (0.55 + Math.random() * 0.45),
    r: 1.0 + Math.random() * 2.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -0.08 - Math.random() * 0.35,
    alpha: 0.15 + Math.random() * 0.5,
    phase: Math.random() * Math.PI * 2,
    speed: 0.01 + Math.random() * 0.03,
    baseY: 0 // will be set dynamically
  });
}

// ---- Meteor shower burst ----
let burstCooldown = 0;
const burstParticles = [];

function triggerBurst() {
  const rx = Math.random() * W;
  const ry = Math.random() * H * 0.2;
  const baseAngle = (Math.PI * 0.22) + Math.random() * Math.PI * 0.2;
  const spread = 0.04 + Math.random() * 0.06;
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const a = baseAngle + (Math.random() - 0.5) * spread;
    const dist = Math.random() * 30;
    setTimeout(() => {
      spawnMeteor(rx + Math.cos(a) * dist, ry + Math.sin(a) * dist, a, false);
    }, i * 50 + Math.random() * 200);
  }
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 0.2 + Math.random() * 0.8;
    burstParticles.push({
      x: rx, y: ry,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 30 + Math.random() * 40,
      maxLife: 70
    });
  }
}

// ---- Aurora bands ----
function drawAurora(t) {
  const bands = [
    { yFrac: 0.06, color: [70, 255, 140], amp: 35, freq: 0.003, speed: 0.4, alpha: 0.06 },
    { yFrac: 0.12, color: [80, 255, 210], amp: 45, freq: 0.0025, speed: 0.3, alpha: 0.05 },
    { yFrac: 0.19, color: [140, 100, 255], amp: 30, freq: 0.0035, speed: 0.5, alpha: 0.04 },
    { yFrac: 0.08, color: [180, 220, 255], amp: 25, freq: 0.004, speed: 0.35, alpha: 0.04 },
  ];

  bands.forEach(band => {
    const baseY = H * band.yFrac;
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 3) {
      let y = baseY;
      y += Math.sin(x * band.freq + t * band.speed) * band.amp;
      y += Math.sin(x * band.freq * 2.3 - t * band.speed * 0.7) * band.amp * 0.5;
      y += Math.sin(x * band.freq * 0.4 + t * band.speed * 1.3) * band.amp * 0.35;
      ctx.lineTo(x, y);
    }
    const grad = ctx.createLinearGradient(0, baseY - band.amp * 1.5, 0, baseY + band.amp * 1.5);
    const [r, g, b] = band.color;
    grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
    grad.addColorStop(0.3, `rgba(${r},${g},${b},${band.alpha})`);
    grad.addColorStop(0.6, `rgba(${r},${g},${b},${band.alpha * 0.4})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = band.amp * 2.5;
    ctx.stroke();
  });
}

let meteorTimer = 0;
let fireballTimer = 0;
let frameCount = 0;

function initAll() {
  milkyWay = drawMilkyWay();
  moonGlow = drawMoonGlow();
  drawNebulae();
}
initAll();

function draw() {
  requestAnimationFrame(draw);
  frameCount++;
  const t = frameCount * 0.016;

  ctx.clearRect(0, 0, W, H);

  // ---- Milky Way ----
  ctx.drawImage(milkyWay, 0, 0);

  // ---- Nebulae ----
  nebulae.forEach(n => {
    ctx.drawImage(n.canvas, n.x, n.y, n.w, n.h);
  });

  // ---- Moon Glow ----
  ctx.drawImage(moonGlow, 0, 0);

  // ---- Aurora ----
  drawAurora(t);

  // ---- Constellation lines ----
  constellations.forEach(c => {
    const connAlpha = 0.06 + Math.sin(t * 0.8) * 0.02;
    ctx.strokeStyle = `rgba(180,200,240,${connAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    const first = stars[c.stars[0]];
    ctx.moveTo(first.x, first.y);
    for (let k = 1; k < c.stars.length; k++) {
      const s = stars[c.stars[k]];
      ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();
  });

  // ---- Afterglows ----
  for (let i = afterglows.length - 1; i >= 0; i--) {
    const ag = afterglows[i];
    ag.alpha -= 0.003;
    if (ag.alpha <= 0) { afterglows.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.moveTo(ag.x1, ag.y1);
    ctx.lineTo(ag.x2, ag.y2);
    ctx.strokeStyle = `rgba(255,255,255,${ag.alpha * 0.15})`;
    ctx.lineWidth = ag.thickness;
    ctx.stroke();
  }

  // ---- Smoke rings (fireball aftermath) ----
  for (let i = smokeRings.length - 1; i >= 0; i--) {
    const sr = smokeRings[i];
    sr.radius += 0.15;
    sr.alpha -= 0.006;
    if (sr.alpha <= 0) { smokeRings.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(sr.x, sr.y, sr.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,140,${sr.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Faint fill
    ctx.fillStyle = `rgba(255,180,100,${sr.alpha * 0.15})`;
    ctx.fill();
  }

  // ---- Dust ----
  dust.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    if (d.x < -10) d.x = W + 10;
    if (d.x > W + 10) d.x = -10;
    if (d.y < -10) d.y = H + 10;
    if (d.y > H + 10) d.y = -10;
    const a = d.alpha + Math.sin(t * 1.5 + d.phase) * 0.12;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(170,190,240,${Math.max(0, a)})`;
    ctx.fill();
  });

  // ---- Fireflies ----
  fireflies.forEach(f => {
    f.x += f.vx + Math.sin(t * 2 + f.phase) * 0.15;
    f.y += f.vy + Math.cos(t * 1.7 + f.phase) * 0.1;
    if (f.x < -20) f.x = W + 20;
    if (f.x > W + 20) f.x = -20;
    if (f.y < H * 0.5) { f.y = H + 10; f.x = Math.random() * W; }
    if (f.y > H + 20) { f.y = H * 0.5 + Math.random() * 10; f.x = Math.random() * W; }

    const pulse = 0.5 + 0.5 * Math.sin(t * f.speed * 60 + f.phase);
    const a = f.alpha * pulse;

    // Glow
    const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 5);
    glow.addColorStop(0, `rgba(255,220,140,${a * 0.5})`);
    glow.addColorStop(0.4, `rgba(255,180,80,${a * 0.2})`);
    glow.addColorStop(1, 'rgba(255,140,40,0)');
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,230,170,${a})`;
    ctx.fill();
  });

  // ---- Stars ----
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 60 + s.twinklePhase);
    const alpha = s.baseAlpha * twinkle;
    let color;
    if (s.color === '#c8d8ff') color = `rgba(200,216,255,${alpha})`;
    else if (s.color === '#ffe0c0') color = `rgba(255,224,192,${alpha})`;
    else color = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (s.r > 1.3 && twinkle > 0.82) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
      glow.addColorStop(0, 'rgba(255,255,255,0.35)');
      glow.addColorStop(0.5, 'rgba(200,220,255,0.08)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Cross flare for brightest stars
    if (s.r > 1.5 && twinkle > 0.88) {
      const flareAlpha = (twinkle - 0.88) / 0.12 * alpha * 0.45;
      const flareLen = s.r * 7;
      const flareW = s.r * 0.6;

      // Horizontal
      const hGrad = ctx.createLinearGradient(s.x - flareLen, s.y, s.x + flareLen, s.y);
      hGrad.addColorStop(0, 'rgba(255,255,255,0)');
      hGrad.addColorStop(0.4, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(0.5, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(0.6, `rgba(255,255,255,${flareAlpha})`);
      hGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hGrad;
      ctx.fillRect(s.x - flareLen, s.y - flareW, flareLen * 2, flareW * 2);

      // Vertical
      const vGrad = ctx.createLinearGradient(s.x, s.y - flareLen, s.x, s.y + flareLen);
      vGrad.addColorStop(0, 'rgba(255,255,255,0)');
      vGrad.addColorStop(0.4, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(0.5, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(0.6, `rgba(255,255,255,${flareAlpha})`);
      vGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = vGrad;
      ctx.fillRect(s.x - flareW, s.y - flareLen, flareW * 2, flareLen * 2);
    }
  });

  // ---- Burst particles ----
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const bp = burstParticles[i];
    bp.x += bp.vx;
    bp.y += bp.vy;
    bp.life--;
    if (bp.life <= 0) { burstParticles.splice(i, 1); continue; }
    const progress = bp.life / bp.maxLife;
    const a = progress < 0.15 ? progress / 0.15 : 1;
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, 1.2 * a, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${a})`;
    ctx.fill();
  }

  // ---- Spawn logic ----
  meteorTimer++;
  if (meteorTimer > 35 + Math.random() * 70 && meteors.length < 3) {
    meteorTimer = 0;
    if (Math.random() < 0.25 && burstCooldown <= 0) {
      triggerBurst();
      burstCooldown = 200 + Math.random() * 300;
    } else {
      spawnMeteor(null, null, null, false);
    }
  }
  if (burstCooldown > 0) burstCooldown--;

  // ---- Fireball spawn ----
  fireballTimer++;
  if (fireballTimer > 600 + Math.random() * 540) {
    fireballTimer = 0;
    const fx = Math.random() * W;
    const fy = Math.random() * H * 0.25;
    const fa = (Math.PI * 0.2) + Math.random() * Math.PI * 0.22;
    spawnMeteor(fx, fy, fa, true);
  }

  // ---- Meteors ----
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx;
    m.y += m.vy;
    m.life--;

    const trailLen = m.isFireball ? 120 : METEOR_TRAIL_LEN;
    m.trail.unshift({ x: m.x, y: m.y });
    if (m.trail.length > trailLen) m.trail.length = trailLen;

    const sparkRate = m.isFireball ? 0.95 : 0.7;
    const sparkCount = m.isFireball ? 3 : 1;
    if (m.life > 0 && Math.random() < sparkRate) {
      for (let s = 0; s < sparkCount; s++) {
        m.sparks.push({
          x: m.x, y: m.y,
          vx: (Math.random() - 0.5) * 1.5,
          vy: (Math.random() - 0.5) * 1.5,
          life: 8 + Math.random() * 12,
          maxLife: 20
        });
      }
    }

    // Draw & age sparks
    for (let si = m.sparks.length - 1; si >= 0; si--) {
      const sp = m.sparks[si];
      sp.x += sp.vx;
      sp.y += sp.vy;
      sp.life--;
      if (sp.life <= 0) { m.sparks.splice(si, 1); continue; }
      const sa = sp.life / sp.maxLife;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, (m.isFireball ? 1.2 : 0.8) * sa, 0, Math.PI * 2);
      const sparkColor = m.isFireball
        ? `rgba(255,220,140,${sa})`
        : `rgba(255,240,220,${sa})`;
      ctx.fillStyle = sparkColor;
      ctx.fill();
    }

    if (m.life <= 0) {
      if (m.trail.length > 2) {
        afterglows.push({
          x1: m.trail[0].x, y1: m.trail[0].y,
          x2: m.trail[m.trail.length - 1].x, y2: m.trail[m.trail.length - 1].y,
          alpha: m.isFireball ? 1.5 : 1,
          thickness: m.thickness
        });
      }
      // Smoke ring for fireballs
      if (m.isFireball) {
        smokeRings.push({
          x: m.x, y: m.y,
          radius: m.thickness * 3,
          alpha: 0.3
        });
      }
      meteors.splice(i, 1);
      continue;
    }

    const progress = m.life / m.maxLife;
    const alpha = progress < 0.08 ? progress / 0.08 : (progress > 0.85 ? (1 - progress) / 0.15 : 1);

    if (m.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(m.trail[0].x, m.trail[0].y);
      for (let j = 1; j < m.trail.length; j++) {
        ctx.lineTo(m.trail[j].x, m.trail[j].y);
      }
      const grad = ctx.createLinearGradient(
        m.trail[0].x, m.trail[0].y,
        m.trail[m.trail.length - 1].x, m.trail[m.trail.length - 1].y
      );
      if (m.isFireball) {
        grad.addColorStop(0, `rgba(255,240,180,${alpha})`);
        grad.addColorStop(0.2, `rgba(255,200,100,${alpha * 0.7})`);
        grad.addColorStop(0.5, `rgba(255,150,60,${alpha * 0.3})`);
        grad.addColorStop(1, 'rgba(255,100,30,0)');
      } else {
        grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
        grad.addColorStop(0.25, `rgba(220,230,255,${alpha * 0.65})`);
        grad.addColorStop(0.6, `rgba(180,200,240,${alpha * 0.2})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
      }
      ctx.strokeStyle = grad;
      ctx.lineWidth = m.thickness * alpha;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Head glow
    const glowRadius = m.isFireball ? m.thickness * 8 : m.thickness * 5;
    const headGlow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, glowRadius);
    if (m.isFireball) {
      headGlow.addColorStop(0, `rgba(255,240,200,${alpha})`);
      headGlow.addColorStop(0.2, `rgba(255,200,120,${alpha * 0.6})`);
      headGlow.addColorStop(0.5, `rgba(255,150,60,${alpha * 0.25})`);
      headGlow.addColorStop(1, 'rgba(255,100,30,0)');
    } else {
      headGlow.addColorStop(0, `rgba(255,255,255,${alpha})`);
      headGlow.addColorStop(0.3, `rgba(220,230,255,${alpha * 0.55})`);
      headGlow.addColorStop(1, 'rgba(255,255,255,0)');
    }
    ctx.beginPath();
    ctx.arc(m.x, m.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = headGlow;
    ctx.fill();
  }
}

draw();

window.addEventListener('resize', () => {
  resize();
  initAll();
  buildConstellations();
});
</script>
</body>
</html>
